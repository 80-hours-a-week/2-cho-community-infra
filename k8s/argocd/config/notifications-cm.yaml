# ArgoCD Notifications — GitHub commit status 연동
# 사전 설정: GitHub App 생성 후 argocd-notifications-secret에 자격증명 저장
# kubectl create secret generic argocd-notifications-secret -n argocd \
#   --from-literal=github-app-id=<id> \
#   --from-literal=github-installation-id=<id> \
#   --from-literal=github-private-key="$(cat <key>.pem)"
apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-notifications-cm
  namespace: argocd
data:
  # GitHub commit status 서비스
  service.github: |
    appID: $github-app-id
    installationID: $github-installation-id
    privateKey: $github-private-key

  # sync 성공 템플릿
  template.app-sync-succeeded: |
    github:
      repoURLPath: "{{.app.spec.source.repoURL}}"
      revisionPath: "{{.app.status.operationState.syncResult.revision}}"
      status:
        state: success
        label: "continuous-delivery/{{.app.metadata.name}}"
        targetURL: "https://argocd.my-community.shop/applications/{{.app.metadata.name}}"

  # sync 실패 템플릿
  template.app-sync-failed: |
    github:
      repoURLPath: "{{.app.spec.source.repoURL}}"
      revisionPath: "{{.app.status.operationState.syncResult.revision}}"
      status:
        state: failure
        label: "continuous-delivery/{{.app.metadata.name}}"
        targetURL: "https://argocd.my-community.shop/applications/{{.app.metadata.name}}"

  # 헬스 상태 저하 템플릿
  template.app-health-degraded: |
    github:
      repoURLPath: "{{.app.spec.source.repoURL}}"
      revisionPath: "{{.app.status.sync.revision}}"
      status:
        state: error
        label: "continuous-delivery/{{.app.metadata.name}}"
        targetURL: "https://argocd.my-community.shop/applications/{{.app.metadata.name}}"

  # 트리거 정의
  trigger.on-sync-succeeded: |
    - when: app.status.operationState.phase in ['Succeeded']
      send: [app-sync-succeeded]
  trigger.on-sync-failed: |
    - when: app.status.operationState.phase in ['Error', 'Failed']
      send: [app-sync-failed]
  trigger.on-health-degraded: |
    - when: app.status.health.status == 'Degraded'
      send: [app-health-degraded]
