apiVersion: batch/v1
kind: CronJob
metadata:
  name: email-digest
  namespace: app
spec:
  schedule: "0 0 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: digest
              image: curlimages/curl:latest
              command:
                - /bin/sh
                - -c
                - |
                  curl -sf -X POST \
                    -H "X-Internal-Key: $INTERNAL_API_KEY" \
                    http://community-api.app.svc.cluster.local:8000/v1/admin/digest/send
              envFrom:
                - secretRef:
                    name: community-secrets
          restartPolicy: OnFailure
